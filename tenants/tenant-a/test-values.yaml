tenantName: tenant-a
namespace: tenant-a

image:
  repository: local/tenant-a-flink-job
  tag: test
  pullPolicy: IfNotPresent

flinkVersion: v1_19

job:
  className: com.example.tenanta.OrdersEnrichmentJob
  jarURI: local:///opt/flink/usrlib/tenant-a-flink-job.jar
  parallelism: 1
  restartNonce: 1

kafka:
  bootstrapServers: kafka:9092
  inputTopics:
    - tenant-a-orders
    - tenant-a-customers
  outputTopic: tenant-a-enriched-orders
  consumerGroupId: tenant-a-flink-job

checkpointing:
  interval: 60s
