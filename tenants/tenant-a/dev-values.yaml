tenantName: tenant-a
namespace: tenant-a

image:
  repository: ghcr.io/faezeh-kianimoravej/tenant-a-flink-job
  # Replace with the immutable Git SHA tag pushed by tenant-a CI after the
  # Java 21 / Flink 2.2.1 tenant image build succeeds.
  tag: TODO_REPLACE_WITH_TENANT_A_COMMIT_SHA
  pullPolicy: IfNotPresent

flinkVersion: v2_2

job:
  className: com.example.tenanta.TenantAFlinkJobApplication
  jarURI: local:///opt/flink/usrlib/tenant-a-flink-job.jar
  parallelism: 1
  restartNonce: 7

kafka:
  bootstrapServers: flink-platform-kafka-kafka-bootstrap.kafka-system.svc.cluster.local:9092
  inputTopics:
    - tenant-a-orders
    - tenant-a-customers
  outputTopic: tenant-a-enriched-orders
  consumerGroupId: tenant-a-flink-job

checkpointing:
  interval: 30s
