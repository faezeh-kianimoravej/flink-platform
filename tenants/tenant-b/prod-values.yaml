tenantName: tenant-b
namespace: tenant-b

image:
  repository: local/tenant-b-flink-job
  tag: prod
  pullPolicy: IfNotPresent

flinkVersion: v1_19

job:
  className: com.example.tenantb.OrdersEnrichmentJob
  jarURI: local:///opt/flink/usrlib/tenant-b-flink-job.jar
  parallelism: 2
  restartNonce: 1

kafka:
  bootstrapServers: kafka:9092
  inputTopics:
    - tenant-b-orders
    - tenant-b-customers
  outputTopic: tenant-b-enriched-orders
  consumerGroupId: tenant-b-flink-job

checkpointing:
  interval: 120s
