tenantName: tenant-b
namespace: tenant-b

image:
  repository: ghcr.io/faezeh-kianimoravej/tenant-b-flink-job
  # Replace with the immutable Git SHA tag promoted to production.
  tag: TODO_REPLACE_WITH_TENANT_B_COMMIT_SHA
  pullPolicy: IfNotPresent

flinkVersion: v2_2

job:
  className: com.example.tenantb.TenantBFlinkJobApplication
  jarURI: local:///opt/flink/usrlib/tenant-b-flink-job.jar
  parallelism: 2
  restartNonce: 1

kafka:
  bootstrapServers: flink-platform-kafka-kafka-bootstrap.kafka-system.svc.cluster.local:9092
  inputTopics:
    - tenant-b-orders
    - tenant-b-products
  outputTopic: tenant-b-enriched-orders
  consumerGroupId: tenant-b-flink-job

checkpointing:
  interval: 120s
