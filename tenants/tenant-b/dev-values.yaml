tenantName: tenant-b
namespace: tenant-b

image:
  repository: ghcr.io/faezeh-kianimoravej/tenant-b-flink-job
  # Replace with the immutable Git SHA tag pushed by tenant-b CI after the
  # Java 21 / Flink 2.2.1 tenant image build succeeds.
  tag: b60bd4c1dbbf9deaa9fcc8418a43bb947ce7004c
  pullPolicy: IfNotPresent

flinkVersion: v2_2

job:
  className: com.example.tenantb.TenantBFlinkJobApplication
  jarURI: local:///opt/flink/usrlib/tenant-b-flink-job.jar
  parallelism: 1
  restartNonce: 7

kafka:
  bootstrapServers: flink-platform-kafka-kafka-bootstrap.kafka-system.svc.cluster.local:9092
  inputTopics:
    - tenant-b-orders
    - tenant-b-products
  outputTopic: tenant-b-enriched-orders
  consumerGroupId: tenant-b-flink-job

checkpointing:
  interval: 30s
