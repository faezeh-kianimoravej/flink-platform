tenantName: tenant-b
namespace: tenant-b

image:
  repository: ghcr.io/faezeh-kianimoravej/tenant-b-flink-job
  # Replace with the immutable Git SHA tag pushed by tenant-b CI after the
  # Java 21 / Flink 2.2.1 tenant image build succeeds.
  tag: 66845ebf40854f9e47b3c4c630bb3214082aaedb
  pullPolicy: IfNotPresent

flinkVersion: v2_2

job:
  className: com.example.tenantb.TenantBFlinkJobApplication
  jarURI: local:///opt/flink/usrlib/tenant-b-flink-job.jar
  parallelism: 1
  restartNonce: 7

kafka:
  bootstrapServers: flink-platform-kafka-kafka-bootstrap.kafka-system.svc.cluster.local:9092
  inputTopics:
    - tenant-b-orders
    - tenant-b-products
  outputTopic: tenant-b-enriched-orders
  consumerGroupId: tenant-b-flink-job
  security:
    enabled: true
    protocol: SASL_PLAINTEXT
    saslMechanism: SCRAM-SHA-512
    username: tenant-b-flink-user
    userSecretName: tenant-b-flink-user
    passwordKey: password

governance:
  applicationId: APP-TENANT-B
  ownerTeam: tenant-b
  kafkaUser: tenant-b-flink-user

checkpointing:
  interval: 30s
