name: Onboard Tenant

on:
  workflow_dispatch:
    inputs:
      tenant_id:
        description: "Tenant identifier, for example tenant-c."
        required: true
        type: string
      tenant_display_name:
        description: "Human-readable tenant name, for example Tenant C."
        required: true
        type: string
      repository_name:
        description: "Tenant job repository name, for example tenant-c-flink-job."
        required: true
        type: string
      image_repository:
        description: "GHCR image repository. Leave blank for ghcr.io/faezeh-kianimoravej/<repository_name>."
        required: false
        type: string
      initial_image_tag:
        description: "Full immutable tenant repository commit SHA image tag. Do not use latest."
        required: true
        type: string
      java_main_class:
        description: "Tenant Flink job main class."
        required: true
        type: string
      jar_name:
        description: "Job JAR file name inside the image, for example tenant-c-flink-job.jar."
        required: true
        type: string
      application_id:
        description: "Governance application ID, for example APP-TENANT-C."
        required: true
        type: string
      owner_team:
        description: "Owner team label value, for example tenant-c."
        required: true
        type: string
      input_topics:
        description: "Comma-separated tenant input topics, for example tenant-c-orders,tenant-c-products."
        required: true
        type: string
      output_topic:
        description: "Tenant output topic, for example tenant-c-enriched-orders."
        required: true
        type: string
      consumer_group_id:
        description: "Tenant consumer group. Leave blank for <tenant_id>-flink-job."
        required: false
        type: string
      kafka_user:
        description: "KafkaUser and Secret name. Leave blank for <tenant_id>-flink-user."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  onboard:
    name: Generate Tenant Onboarding PR
    runs-on: ubuntu-latest

    env:
      BRANCH_NAME: onboard/${{ inputs.tenant_id }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout platform repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python dependencies
        run: python -m pip install --upgrade pyyaml

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Validate onboarding inputs
        run: |
          set -euo pipefail
          python .github/scripts/generate_tenant.py \
            --tenant-id "${{ inputs.tenant_id }}" \
            --tenant-display-name "${{ inputs.tenant_display_name }}" \
            --repository-name "${{ inputs.repository_name }}" \
            --image-repository "${{ inputs.image_repository }}" \
            --initial-image-tag "${{ inputs.initial_image_tag }}" \
            --java-main-class "${{ inputs.java_main_class }}" \
            --jar-name "${{ inputs.jar_name }}" \
            --application-id "${{ inputs.application_id }}" \
            --owner-team "${{ inputs.owner_team }}" \
            --input-topics "${{ inputs.input_topics }}" \
            --output-topic "${{ inputs.output_topic }}" \
            --consumer-group-id "${{ inputs.consumer_group_id }}" \
            --kafka-user "${{ inputs.kafka_user }}" \
            --dry-run

      - name: Check onboarding branch does not already exist
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            echo "Branch already exists: $BRANCH_NAME" >&2
            exit 1
          fi

      - name: Create remote onboarding branch from origin/main
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          base_sha="$(git rev-parse origin/main)"
          gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f ref="refs/heads/${BRANCH_NAME}" \
            -f sha="$base_sha"

      - name: Fetch and check out onboarding branch
        run: |
          set -euo pipefail
          git fetch origin "$BRANCH_NAME"
          git checkout --track "origin/$BRANCH_NAME"

      - name: Generate validate commit push and open PR
        run: |
          set -euo pipefail

          cleanup() {
            exit_code=$?
            if [ "$exit_code" -ne 0 ]; then
              gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${BRANCH_NAME}" >/dev/null 2>&1 || true
            fi
          }

          trap cleanup EXIT

          python .github/scripts/generate_tenant.py \
            --tenant-id "${{ inputs.tenant_id }}" \
            --tenant-display-name "${{ inputs.tenant_display_name }}" \
            --repository-name "${{ inputs.repository_name }}" \
            --image-repository "${{ inputs.image_repository }}" \
            --initial-image-tag "${{ inputs.initial_image_tag }}" \
            --java-main-class "${{ inputs.java_main_class }}" \
            --jar-name "${{ inputs.jar_name }}" \
            --application-id "${{ inputs.application_id }}" \
            --owner-team "${{ inputs.owner_team }}" \
            --input-topics "${{ inputs.input_topics }}" \
            --output-topic "${{ inputs.output_topic }}" \
            --consumer-group-id "${{ inputs.consumer_group_id }}" \
            --kafka-user "${{ inputs.kafka_user }}"

          python .github/scripts/validate_tenant_onboarding.py \
            --tenant-id "${{ inputs.tenant_id }}" \
            --check-git-diff

          git config user.name "tenant-onboarding-bot"
          git config user.email "tenant-onboarding-bot@users.noreply.github.com"
          git add -- \
            "namespaces/${{ inputs.tenant_id }}.yaml" \
            "rbac/${{ inputs.tenant_id }}-rbac.yaml" \
            "tenants/${{ inputs.tenant_id }}/dev-values.yaml" \
            "argocd/${{ inputs.tenant_id }}-flink-job.yaml" \
            "kafka/topics/${{ inputs.tenant_id }}-topics.yaml" \
            "kafka/users/${{ inputs.tenant_id }}-flink-user.yaml"
          git commit -m "chore(${{ inputs.tenant_id }}): generate platform onboarding resources"
          git push origin HEAD:"$BRANCH_NAME"

          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "chore(${{ inputs.tenant_id }}): onboard Flink tenant" \
            --body "Tenant onboarding generated for ${{ inputs.tenant_id }}."

          trap - EXIT