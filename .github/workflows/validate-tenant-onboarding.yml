name: Validate Tenant Onboarding

on:
  pull_request:
    paths:
      - "namespaces/*.yaml"
      - "rbac/*-rbac.yaml"
      - "tenants/*/dev-values.yaml"
      - "argocd/*-flink-job.yaml"
      - "kafka/topics/*-topics.yaml"
      - "kafka/users/*-flink-user.yaml"
      - "operator/*.yaml"

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Validate Tenant Onboarding
    runs-on: ubuntu-latest

    steps:
      - name: Checkout platform repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python dependencies
        run: python -m pip install --upgrade pyyaml

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Validate tenant onboarding change
        run: |
          python .github/scripts/validate_tenant_onboarding.py \
            --base-ref "${{ github.event.pull_request.base.sha }}" \
            --head-ref "${{ github.event.pull_request.head.sha }}" \
            --check-git-diff
