# In production, the Platform Team would create and review tenant RBAC during
# tenant onboarding. This prototype keeps the permissions small and readable.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-operator-tenant-a
  namespace: tenant-a
rules:
  - apiGroups:
      - flink.apache.org
    resources:
      - flinkdeployments
      - flinksessionjobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - configmaps
      - events
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-operator-tenant-a
  namespace: tenant-a
subjects:
  - kind: ServiceAccount
    name: flink-kubernetes-operator
    namespace: flink-operator-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-operator-tenant-a
