# The Flink Kubernetes Operator runs in the platform-system namespace.
# During tenant onboarding, the Platform Team grants it namespace-scoped
# permissions for each tenant namespace.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink
  namespace: tenant-a
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenant-a-flink-operator-role
  namespace: tenant-a
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - configmaps
      - secrets
      - events
      - serviceaccounts
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - flink.apache.org
    resources:
      - flinkdeployments
      - flinksessionjobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
# Bind the tenant-a Role to the operator service account in platform-system and
# to the tenant runtime service account used by JobManager and TaskManager pods.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tenant-a-flink-operator-rolebinding
  namespace: tenant-a
subjects:
  - kind: ServiceAccount
    name: flink-kubernetes-operator
    namespace: platform-system
  - kind: ServiceAccount
    name: flink
    namespace: tenant-a
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tenant-a-flink-operator-role
