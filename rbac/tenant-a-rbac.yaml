# The Flink Kubernetes Operator runs in the platform-system namespace.
# During tenant onboarding, the Platform Team grants it namespace-scoped
# permissions for each tenant namespace.
#
# This Role only applies inside tenant-a. It does not grant tenant-a access to
# tenant-b, and it does not control Kafka topic access. Kafka permissions are
# managed separately from Kubernetes RBAC.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenant-a-flink-operator-role
  namespace: tenant-a
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - configmaps
      - secrets
      - events
      - serviceaccounts
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - flink.apache.org
    resources:
      - flinkdeployments
      - flinksessionjobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
# Bind the tenant-a Role to the operator service account in platform-system.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tenant-a-flink-operator-rolebinding
  namespace: tenant-a
subjects:
  - kind: ServiceAccount
    name: flink-kubernetes-operator
    namespace: platform-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tenant-a-flink-operator-role
