tenantName: demo-tenant
namespace: demo-tenant

image:
  repository: ghcr.io/faezeh-kianimoravej/flink-demo-job
  tag: TODO_REPLACE_WITH_TENANT_COMMIT_SHA
  pullPolicy: IfNotPresent

flinkVersion: v2_2

serviceAccount: flink

jobManager:
  resource:
    cpu: 1
    memory: "1024m"

taskManager:
  replicas: 1
  resource:
    cpu: 1
    memory: "1024m"

job:
  className: com.example.flink.DemoJob
  jarURI: local:///opt/flink/usrlib/job.jar
  parallelism: 1
  restartNonce: 1
  upgradeMode: stateless

kafka:
  bootstrapServers: flink-platform-kafka-kafka-bootstrap.kafka-system.svc.cluster.local:9092
  inputTopics:
    - demo-orders
    - demo-customers
  outputTopic: demo-enriched-orders
  consumerGroupId: demo-flink-job
  security:
    enabled: true
    protocol: SASL_PLAINTEXT
    saslMechanism: SCRAM-SHA-512
    userSecretName: demo-flink-user
    usernameKey: username
    passwordKey: password

governance:
  applicationId: APP-DEMO
  ownerTeam: demo-tenant
  kafkaUser: demo-flink-user

checkpointing:
  interval: 30s
