apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: {{ include "flink-job.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "flink-job.labels" . | nindent 4 }}
    platform.example.com/application-id: {{ .Values.governance.applicationId | quote }}
    platform.example.com/owner-team: {{ .Values.governance.ownerTeam | quote }}
    platform.example.com/kafka-user: {{ .Values.governance.kafkaUser | quote }}
spec:
  image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
  imagePullPolicy: {{ .Values.image.pullPolicy }}
  flinkVersion: {{ .Values.flinkVersion }}
  serviceAccount: {{ .Values.serviceAccount }}
  restartNonce: {{ .Values.job.restartNonce }}
  {{- if .Values.kafka.security.enabled }}
  podTemplate:
    spec:
      containers:
        - name: flink-main-container
          env:
            - name: KAFKA_SECURITY_PROTOCOL
              value: {{ .Values.kafka.security.protocol | quote }}
            - name: KAFKA_SASL_MECHANISM
              value: {{ .Values.kafka.security.saslMechanism | quote }}
            - name: KAFKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kafka.security.userSecretName | quote }}
                  key: {{ .Values.kafka.security.usernameKey | quote }}
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kafka.security.userSecretName | quote }}
                  key: {{ .Values.kafka.security.passwordKey | quote }}
  {{- end }}
  flinkConfiguration:
    pipeline.name: "{{ .Values.tenantName }}-flink-job"
    taskmanager.numberOfTaskSlots: "{{ .Values.job.parallelism }}"
    execution.checkpointing.interval: {{ .Values.checkpointing.interval | quote }}
    prototype.tenant.name: {{ .Values.tenantName | quote }}
    prototype.kafka.bootstrap.servers: {{ .Values.kafka.bootstrapServers | quote }}
    prototype.kafka.input.topics: {{ join "," .Values.kafka.inputTopics | quote }}
    prototype.kafka.output.topic: {{ .Values.kafka.outputTopic | quote }}
    prototype.kafka.consumer.group.id: {{ .Values.kafka.consumerGroupId | quote }}
    prototype.kafka.security.protocol: {{ .Values.kafka.security.protocol | quote }}
    prototype.kafka.sasl.mechanism: {{ .Values.kafka.security.saslMechanism | quote }}
    prototype.governance.application.id: {{ .Values.governance.applicationId | quote }}
    prototype.governance.owner.team: {{ .Values.governance.ownerTeam | quote }}
    prototype.governance.kafka.user: {{ .Values.governance.kafkaUser | quote }}
  jobManager:
    resource:
      cpu: {{ .Values.jobManager.resource.cpu }}
      memory: {{ .Values.jobManager.resource.memory | quote }}
  taskManager:
    replicas: {{ .Values.taskManager.replicas }}
    resource:
      cpu: {{ .Values.taskManager.resource.cpu }}
      memory: {{ .Values.taskManager.resource.memory | quote }}
  job:
    jarURI: {{ .Values.job.jarURI | quote }}
    entryClass: {{ .Values.job.className | quote }}
    parallelism: {{ .Values.job.parallelism }}
    upgradeMode: {{ .Values.job.upgradeMode }}
    state: running
    args:
      - "--tenant={{ .Values.tenantName }}"
      - "--kafka.bootstrap.servers={{ .Values.kafka.bootstrapServers }}"
      - "--input.topics={{ join "," .Values.kafka.inputTopics }}"
      - "--orders.input.topic={{ index .Values.kafka.inputTopics 0 }}"
      - "--customers.input.topic={{ index .Values.kafka.inputTopics 1 }}"
      - "--products.input.topic={{ index .Values.kafka.inputTopics 1 }}"
      - "--output.topic={{ .Values.kafka.outputTopic }}"
      - "--consumer.group.id={{ .Values.kafka.consumerGroupId }}"
      - "--kafka.security.protocol={{ .Values.kafka.security.protocol }}"
      - "--kafka.sasl.mechanism={{ .Values.kafka.security.saslMechanism }}"
      - "--platform.application.id={{ .Values.governance.applicationId }}"
      - "--owner.team={{ .Values.governance.ownerTeam }}"
      - "--kafka.user={{ .Values.governance.kafkaUser }}"
      - "--checkpoint.interval={{ .Values.checkpointing.interval }}"
