apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tenant-a-flink-job
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/faezeh-kianimoravej/flink-platform.git
    targetRevision: main
    path: charts/flink-job
    helm:
      releaseName: tenant-a
      valueFiles:
        - ../../tenants/tenant-a/dev-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: tenant-a
  ignoreDifferences:
    - group: flink.apache.org
      kind: FlinkDeployment
      jsonPointers:
        - /metadata/finalizers
        - /metadata/managedFields
        - /metadata/generation
        - /metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
